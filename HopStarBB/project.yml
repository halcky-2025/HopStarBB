        PRODUCT_BUNDLE_IDENTIFIER: com.hayakawa.syou1.hopstarbb
        PRODUCT_NAME: HopStarBB
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        HEADER_SEARCH_PATHS:

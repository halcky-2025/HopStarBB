  # ============================================================
  # iOS Simulator: Xcode native build
  # ============================================================
  HopStarBB-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    info:
      path: platform/apple/Info-iOS.plist
      properties:
        CFBundleDisplayName: HopStarBB
        UILaunchStoryboardName: LaunchScreen
        UIRequiresFullScreen: true
        UIStatusBarHidden: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSupportsIndirectInputEvents: true
        UIRequiredDeviceCapabilities:
          - arm64
          - metal
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UISupportsDocumentBrowser: true
        NSDocumentsFolderUsageDescription: HopStarBB がファイルを開くために Documents フォルダにアクセスします
        NSDownloadsFolderUsageDescription: HopStarBB がファイルを開くために Downloads フォルダにアクセスします
        NSMicrophoneUsageDescription: HopStarBB が音声録音にマイクを使用します
        NSCameraUsageDescription: HopStarBB がカメラを使用します

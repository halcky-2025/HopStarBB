schemes:
  HopStarBB:
    build:
      targets:
        HopStarBB: all
    run:
      customExecutable: HopStar_macOS
      customWorkingDirectory: $(SRCROOT)
  HopStarBB-iOS:
    build:
      targets:
        HopStarBB-iOS: all
    run:
      config: Debug

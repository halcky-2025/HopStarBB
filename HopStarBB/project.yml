          - $(PROJECT_DIR)/libs/SDL3_ttf/build-ios-device/external/plutosvg-guild
          - $(PROJECT_DIR)/libs/SDL3_ttf/build-ios-device/external/plutovg-build
          - $(PROJECT_DIR)/libs/bgfx.cmake/build-ios-device/cmake/bgfx
          - $(PROJECT_DIR)/libs/bgfx.cmake/build-ios-device/cmake/bx
